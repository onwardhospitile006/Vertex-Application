<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Logout Confirmation</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <style>
        body{ font-family: Arial, sans-serif; background:#eef2f6; text-align:center; padding:48px 16px; margin:0 }
        .box{ background:#fff; padding:28px; width:420px; max-width:calc(100% - 40px); margin:40px auto; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,0.08) }
        .actions{ margin-top:18px }
        a.btn{ padding:10px 18px; background:#3385ff; color:#fff; text-decoration:none; border-radius:6px; margin:6px; display:inline-block; font-weight:600 }
        a.cancel{ background:#9aa5b1; color:#fff }
        @media(max-width:480px){ .box{ padding:20px } a.btn{ width:100%; display:block; margin:8px 0 } }
    </style>
</head>
<body>
<div class="box" role="dialog" aria-labelledby="logoutHeading" aria-describedby="logoutDesc">
    <h2 id="logoutHeading">Are you sure you want to logout?</h2>
    <p id="logoutDesc">You will be signed out of your account. You can log in again anytime.</p>

    <div class="actions">
        <!-- Yes: call the action that invalidates the session -->
        <a th:href="@{/do-logout}" class="btn" role="button" aria-label="Confirm logout">Yes, Logout</a>

        <!-- Cancel: safe fallback to previous page -->
        <a href="javascript:history.back()" class="btn cancel" role="button" aria-label="Cancel logout">Cancel</a>
    </div>
</div>
</body>
</html>
