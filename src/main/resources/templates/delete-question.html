<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Delete Question</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 30px;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            color: #1f2d3d;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            font-size: 18px;
            color: #444;
            margin-bottom: 25px;
        }

        form {
            width: 420px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 14px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
            border: 1px solid #d6d9dd;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
            transition: 0.25s ease;
        }

        input:focus {
            border-color: #3385ff;
            box-shadow: 0 0 6px rgba(51, 133, 255, 0.35);
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            background: #e63946;
            color: white;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover {
            background: #c62834;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            text-decoration: none;
            color: #3385ff;
            font-weight: bold;
        }

        .back-link:hover {
            color: #2268d8;
        }

        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>
</head>

<body>
    <a th:href="@{'/manage-one-quiz?quizId=' + ${quizId}}" class="back-btn-fixed">Back</a>

    <h2>Delete a Question</h2>

    <p>Quiz ID: <b th:text="${quizId}"></b></p>

    <form action="/delete-question" method="post">
        <input type="hidden" name="quizId" th:value="${quizId}" />

        <label>Enter Question Number to Delete:</label>
        <input type="number" name="qnum" min="1" required />

        <button type="submit">Delete</button>
    </form>

    <a class="back-link" th:href="@{'/manage-one-quiz?quizId=' + ${quizId}}">Back</a>



</body>

</html>
