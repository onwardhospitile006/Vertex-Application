<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Result</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h2 {
            font-size: 32px;
            color: #1f2d3d;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            color: #444;
            margin-bottom: 30px;
        }

        .score-box {
            background: #ffffff;
            display: inline-block;
            padding: 20px 30px;
            border-radius: 14px;
            border: 1px solid #d6d9dd;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
            font-size: 20px;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            font-size: 18px;
            padding: 12px 20px;
            background: #3385ff;
            color: white;
            border-radius: 8px;
            transition: 0.25s ease;
        }

        a:hover {
            background: #2268d8;
            transform: translateY(-2px);
        }

        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>

</head>

<body>
    <a href="/student-dashboard" class="back-btn-fixed">Back</a>

    <h2>Quiz Completed!!</h2>

    <div class="score-box">
        Your Score:
        <b th:text="${score}"></b>
        /
        <b th:text="${total}"></b>
    </div>

    <br />

    <a href="/student-dashboard">Return to Dashboard</a>



</body>

</html>
