<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            padding: 30px;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #1f2d3d;
            margin-bottom: 10px;
        }

        h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .locked-box {
            background: white;
            width: 420px;
            margin: 30px auto;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .locked-box h3 {
            color: red;
            margin-bottom: 18px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
        }

        .btn:hover {
            background: #2268d8;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #3385ff;
            color: white;
        }

        tr:hover td {
            background: #f3f7ff;
        }

        .actions a {
            margin-right: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .actions a.edit {
            color: #3385ff;
        }

        .actions a.delete {
            color: #e63946;
        }

        .top-actions {
            width: 80%;
            margin: 15px auto 0 auto;
            text-align: right;
        }

        .top-actions a {
            display: inline-block;
            padding: 8px 14px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .top-actions a:hover {
            background: #2268d8;
        }

        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>
</head>

<body>
    <a href="/manage-my-quizzes" class="back-btn-fixed">Back</a>

    <h2>Manage Quiz</h2>
    <h3 th:text="'Quiz ID: ' + ${quizId}"></h3>

    <div th:if="${locked}" class="locked-box">
        <h3>You cannot manage this quiz now.</h3>
        <p>The quiz has already started or is within the restricted time window.</p>
        <a href="/admin-dashboard" class="btn">Return to Dashboard</a>
    </div>

    <div th:if="${!locked}">
        <div class="top-actions">
            <a th:href="@{/add-question-existing(quizId=${quizId})}">Add Question</a>
        </div>

        <table>
            <tr>
                <th>ID</th>
                <th>Question</th>
                <th>Actions</th>
            </tr>

            <tr th:each="q : ${questions}">
                <td th:text="${q.id}"></td>
                <td th:text="${q.text}"></td>
                <td class="actions">
                    <a th:href="@{/edit-question(quizId=${quizId}, qid=${q.id})}" class="edit">Edit</a>
                    <a th:href="@{/delete-question(quizId=${quizId}, qid=${q.id})}" class="delete">Delete</a>
                </td>
            </tr>
        </table>
    </div>


</body>

</html>
