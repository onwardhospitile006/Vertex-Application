<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Available Quizzes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 30px;
        }

        h2 {
            text-align: center;
            font-size: 30px;
            color: #1f2d3d;
            margin-bottom: 25px;
        }

        table {
            width: 80%;
            margin: 0 auto;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        th {
            background: #3385ff;
            color: white;
            padding: 14px;
            font-size: 16px;
        }

        td {
            padding: 12px;
            text-align: center;
            font-size: 15px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover td {
            background: #f3f7ff;
        }

        a.link {
            text-decoration: none;
            font-weight: bold;
            color: #3385ff;
        }

        a.link:hover {
            text-decoration: underline;
        }

        .back-btn {
            display: block;
            width: 220px;
            margin: 25px auto;
            padding: 12px 18px;
            background: #3385ff;
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.25s;
        }

        .back-btn:hover {
            background: #2268d8;
            transform: translateY(-2px);
        }

        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>

</head>

<body>
    <a href="/student-dashboard" class="back-btn-fixed">Back</a>

    <h2>Available Quizzes</h2>

    <table>
        <tr>
            <th>Quiz ID</th>
            <th>Title</th>
            <th>Action</th>
        </tr>

        <tr th:each="q : ${quizzes}">
            <td th:text="${q.id}"></td>
            <td th:text="${q.title}"></td>
            <td>
                <a class="link" th:href="@{/leaderboard(quizId=${q.id})}">View Leaderboard</a>
            </td>
        </tr>
    </table>





</body>

</html>
