<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Review Not Available</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 30px;
        }

        .card {
            max-width: 520px;
            margin: 80px auto;
            background: #ffffff;
            padding: 30px 35px;
            border-radius: 14px;
            border: 1px solid #d6d9dd;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            font-size: 26px;
            color: #1f2d3d;
            margin-bottom: 15px;
        }

        p.message {
            font-size: 18px;
            color: #b22222;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .info {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        a.button {
            display: inline-block;
            padding: 11px 20px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.25s ease;
        }

        a.button:hover {
            background: #2268d8;
            transform: translateY(-2px);
        }

        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>
</head>

<body>
    <a href="/student-dashboard" class="back-btn-fixed">Back</a>

    <div class="card">
        <h2 th:text="${title != null ? title : 'Review Not Available'}">Review Not Available</h2>


        <!-- Controller will set `message` -->
        <p class="message" th:if="${message}" th:text="${message}">
            Review is not available.
        </p>

        <!-- Optional extra info -->
        <p class="info">
            If you think this is a mistake, please contact your instructor or try again later.
        </p>

        <a href="/student-dashboard" class="button">Back to Dashboard</a>
    </div>



</body>

</html>
