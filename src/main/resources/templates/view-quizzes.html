<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>Available Quizzes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f6;
      margin: 0;
      padding: 30px;
    }

    h2 {
      text-align: center;
      font-size: 30px;
      color: #1f2d3d;
      margin-bottom: 25px;
    }

    table {
      width: 80%;
      margin: 0 auto;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 5px 18px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    th {
      background: #3385ff;
      color: white;
      padding: 14px;
      font-size: 16px;
      text-align: center;
    }

    td {
      padding: 12px;
      text-align: center;
      font-size: 15px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover td {
      background: #f3f7ff;
    }

    a.action-link {
      text-decoration: none;
      color: #3385ff;
      font-weight: bold;
      margin: 0 6px;
    }

    a.action-link:hover {
      text-decoration: underline;
    }

    .back-btn {
      display: block;
      width: 220px;
      margin: 25px auto;
      text-align: center;
      padding: 12px 18px;
      background: #3385ff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      transition: 0.25s ease;
    }

    .back-btn:hover {
      background: #2268d8;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

<h2>Available Quizzes</h2>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Creator</th>
    <th>Actions</th>
  </tr>
  </thead>

  <tbody>
  <tr th:each="q : ${quizzes}">
    <td th:text="${q.id}"></td>
    <td th:text="${q.title}"></td>
    <td th:text="${q.creatorId}"></td>
    <td>
      <a class="action-link" th:href="@{'/attempt-quiz/' + ${q.id}}">Attempt</a>
      |
      <a class="action-link" th:href="@{'/manage-one-quiz?quizId=' + ${q.id}}">Manage</a>
    </td>
  </tr>
  </tbody>
</table>

<a class="back-btn" th:href="@{/dashboard}">Back to Dashboard</a>



</body>
</html>
