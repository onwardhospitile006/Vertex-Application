<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Select Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            margin-top: 30px;
            font-size: 26px;
            color: #1f2d3d;
            font-weight: 700;
        }

        ul {
            list-style: none;
            padding: 0;
            width: 450px;
            margin: 30px auto;
        }

        li {
            background: #ffffff;
            padding: 16px 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #d6d9dd;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            transition: 0.25s ease;
        }

        li:hover {
            transform: translateY(-3px);
            border-color: #3385ff;
            box-shadow: 0 5px 16px rgba(0, 0, 0, 0.12);
        }

        a {
            text-decoration: none;
            font-size: 18px;
            color: #2a5bd7;
            font-weight: bold;
        }

        a:hover {
            color: #163f9e;
        }

        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>
</head>

<body>
    <a href="/student-dashboard" class="back-btn-fixed">Back</a>

    <h2>Select a Quiz to Attempt</h2>

    <ul>
        <li th:each="q : ${quizzes}">
            <a th:href="@{'/attempt-quiz/' + ${q.id}}">
                Quiz [[${q.id}]] - [[${q.title}]]
            </a>
            <div style="font-size:14px; color:#555; margin-top:5px;">
                Start: <span th:text="${q.displayStart}"></span> | End: <span th:text="${q.displayEnd}"></span>
                <span th:if="${q.isExpired}" style="color:red; font-weight:bold; margin-left:10px;">(EXPIRED)</span>
            </div>
        </li>
    </ul>



</body>

</html>
