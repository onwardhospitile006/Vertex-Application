<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Quizzes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 30px;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            color: #1f2d3d;
            margin-bottom: 25px;
        }

        p {
            text-align: center;
            font-size: 18px;
            color: #555;
        }

        ul {
            width: 60%;
            margin: 0 auto;
            padding: 0;
            list-style: none;
        }

        li {
            background: #ffffff;
            border: 1px solid #d6d9dd;
            padding: 16px 20px;
            margin-bottom: 14px;
            border-radius: 10px;
            font-size: 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            transition: 0.25s ease;
        }

        li:hover {
            transform: translateY(-3px);
            border-color: #3385ff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }

        a.manage-link {
            text-decoration: none;
            background: #3385ff;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            margin-left: 10px;
            transition: 0.25s ease;
        }

        a.manage-link:hover {
            background: #2268d8;
        }

        a.back-btn {
            display: block;
            text-align: center;
            width: 200px;
            margin: 25px auto;
            background: #3385ff;
            color: white;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.25s ease;
        }

        a.back-btn:hover {
            background: #2268d8;
            transform: translateY(-2px);
        }
    </style>
    <style>
        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>
</head>

<body>

    <h2>Your Quizzes</h2>

    <div th:if="${#lists.isEmpty(myQuizzes)}">
        <p>You have not created any quizzes.</p>
    </div>

    <ul>
        <li th:each="q : ${myQuizzes}">
            <strong th:text="${q.title}">Quiz Title</strong>
            (ID: <span th:text="${q.id}"></span>)
            <a class="manage-link" th:href="@{'/manage-one-quiz?quizId=' + ${q.id}}">Manage</a>
        </li>
    </ul>

    <a class="back-btn" href="/admin-dashboard">Back to Dashboard</a>



</body>

</html>
