<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: #1f2d3d;
        }

        .card {
            width: 420px;
            margin: 20px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        a {
            display: block;
            text-decoration: none;
            background: #3385ff;
            color: white;
            padding: 12px;
            text-align: center;
            margin-top: 12px;
            border-radius: 8px;
            font-size: 16px;
        }

        a:hover {
            background: #2268d8;
        }

        .back-btn-fixed {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #3385ff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .back-btn-fixed:hover {
            background: #2268d8;
        }
    </style>
</head>

<body>

    <h1>Admin Dashboard</h1>
    <h3 style="text-align:center;">Welcome, <span th:text="${username}">Admin</span></h3>

    <div class="card">
        <a href="/create-quiz">Create Quiz</a>
        <a href="/manage-my-quizzes-login">Manage My Quizzes</a>
        <a href="/admin-check-my-quizzes">Check My Quizzes</a>
        <a href="/logout" style="background:#e63946;">Logout</a>
    </div>



</body>

</html>
